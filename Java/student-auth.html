<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* container */

.container{
width:400px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
animation:card .7s ease;
}

@keyframes card{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

/* input */

.input-group{
position:relative;
margin-bottom:22px;
}

.input-group input{
width:100%;
padding:12px 40px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
font-size:14px;
}

.input-group i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#888;
}

.input-group .togglePass{
right:12px;
left:auto;
cursor:pointer;
}

/* focus */

.input-group input:focus{
border-color:#667eea;
box-shadow:0 0 0 3px rgba(102,126,234,.15);
}

/* password strength */

.strength{
height:5px;
border-radius:5px;
margin-top:5px;
background:#eee;
}

.strength div{
height:100%;
width:0%;
border-radius:5px;
transition:.3s;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
background:#667eea;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#5a67d8;
}

button.loading{
opacity:.7;
pointer-events:none;
}

/* toggle text */

.toggle{
text-align:center;
margin-top:18px;
}

.toggle span{
color:#667eea;
cursor:pointer;
font-weight:600;
}

/* extra */

.extra{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:15px;
}

.extra a{
text-decoration:none;
color:#667eea;
}

.error{
color:red;
font-size:12px;
margin-top:3px;
display:none;
}

.register{
display:none;
}

/* popup */

.popup{
position:fixed;
top:20px;
right:-300px;
background:#4CAF50;
color:white;
padding:12px 18px;
border-radius:6px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
transition:.5s;
}

.popup.show{
right:20px;
}

</style>
</head>

<body>

<div class="popup" id="popup">Success!</div>

<div class="container">

<h2 id="title">Student Login</h2>

<!-- LOGIN -->

<form id="loginForm">

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="loginPass" placeholder="Password" required>
<i class="fa fa-eye togglePass" onclick="togglePassword('loginPass',this)"></i>
</div>

<div class="extra">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot?</a>
</div>

<button type="submit" id="loginBtn">Login</button>

</form>


<!-- REGISTER -->

<form id="registerForm" class="register">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" placeholder="Full Name" required>
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="regPass" placeholder="Password" required onkeyup="checkStrength()">
<i class="fa fa-eye togglePass" onclick="togglePassword('regPass',this)"></i>
<div class="strength"><div id="strengthBar"></div></div>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="confirmPass" placeholder="Confirm Password" required>
</div>

<div class="error" id="passError">Passwords do not match</div>

<button type="submit" id="registerBtn">Register</button>

</form>

<div class="toggle">
<span id="toggleText">Create an account</span>
</div>

</div>

<script>

/* form switch */

const loginForm=document.getElementById("loginForm")
const registerForm=document.getElementById("registerForm")
const toggleText=document.getElementById("toggleText")
const title=document.getElementById("title")

toggleText.onclick=()=>{

if(loginForm.style.display!=="none"){

loginForm.style.display="none"
registerForm.style.display="block"
title.innerText="Student Register"
toggleText.innerText="Already have account?"

}else{

loginForm.style.display="block"
registerForm.style.display="none"
title.innerText="Student Login"
toggleText.innerText="Create an account"

}

}


/* password show hide */

function togglePassword(id,icon){

const input=document.getElementById(id)

if(input.type==="password"){
input.type="text"
icon.classList.replace("fa-eye","fa-eye-slash")
}else{
input.type="password"
icon.classList.replace("fa-eye-slash","fa-eye")
}

}


/* password strength */

function checkStrength(){

const pass=document.getElementById("regPass").value
const bar=document.getElementById("strengthBar")

let strength=0

if(pass.length>5) strength++
if(pass.match(/[A-Z]/)) strength++
if(pass.match(/[0-9]/)) strength++
if(pass.match(/[^A-Za-z0-9]/)) strength++

const width=[0,25,50,75,100]
const colors=["red","orange","yellow","blue","green"]

bar.style.width=width[strength]+"%"
bar.style.background=colors[strength]

}


/* register validation */

registerForm.onsubmit=(e)=>{

const pass=document.getElementById("regPass").value
const confirm=document.getElementById("confirmPass").value
const error=document.getElementById("passError")

if(pass!==confirm){
e.preventDefault()
error.style.display="block"
}else{
showPopup("Registration Successful")
}

}


/* login */

loginForm.onsubmit=(e)=>{
showPopup("Login Successful")
}


/* popup */

function showPopup(text){

const popup=document.getElementById("popup")
popup.innerText=text
popup.classList.add("show")

setTimeout(()=>{
popup.classList.remove("show")
},3000)

}

</script>

</body>
</html>
