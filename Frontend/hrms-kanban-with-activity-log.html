<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRMS Kanban Pro</title>

<style>
*{box-sizing:border-box;font-family:system-ui}
body{
margin:0;
background:linear-gradient(135deg,#0f172a,#020617);
color:#e5e7eb;
}

/* HEADER */
header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:600;
}

/* TOP PANEL */
.top{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:0 20px 20px;
}

.top input,.top select{
padding:10px;
border-radius:10px;
border:none;
}

.top button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#38bdf8;
cursor:pointer;
font-weight:600;
}

/* STATS */
.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
font-size:14px;
}

/* BOARD */
.board{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
padding:0 20px 40px;
}

.column{
background:rgba(255,255,255,.05);
border-radius:18px;
padding:14px;
min-height:420px;
}

.column h3{
text-align:center;
margin-bottom:10px;
font-size:16px;
}

.counter{
text-align:center;
font-size:12px;
opacity:.7;
margin-bottom:10px;
}

/* CARD */
.card{
background:rgba(255,255,255,.12);
border-radius:14px;
padding:12px;
margin-bottom:10px;
cursor:grab;
}

.card small{opacity:.7}

.priority{
font-size:11px;
padding:3px 6px;
border-radius:6px;
margin-left:6px;
}
.high{background:#ef4444}
.medium{background:#f59e0b}
.low{background:#22c55e}

/* BUTTONS */
.actions{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.actions button{
border:none;
padding:4px 6px;
border-radius:6px;
font-size:11px;
cursor:pointer;
}

.edit{background:#6366f1}
.delete{background:#ef4444}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}
.modal.active{display:flex}

.modal-box{
width:380px;
background:#020617;
border-radius:18px;
padding:20px;
}

.modal-box input, .modal-box select{
width:100%;
margin-bottom:8px;
padding:8px;
border-radius:8px;
border:none;
}

.modal-box button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#38bdf8;
cursor:pointer;
margin-top:5px;
}
</style>
</head>
<body>

<header>HRMS – Candidate Pipeline Pro</header>

<div class="top">
<input id="nameInput" placeholder="Candidate name">
<input id="roleInput" placeholder="Position">
<select id="priorityInput">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
<button onclick="addCandidate()">Add</button>
<input id="searchInput" placeholder="Search...">
<button onclick="exportData()">Export</button>
<button onclick="clearAll()">Clear All</button>
</div>

<div class="stats" id="stats"></div>

<div class="board" id="board"></div>

<!-- EDIT MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Edit Candidate</h3>
<input id="editName">
<input id="editRole">
<select id="editPriority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
<button onclick="saveEdit()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
const stages=["Applied","Interview","Selected","Joined"];
let candidates=JSON.parse(localStorage.getItem("hrmsPro"))||[];
let searchQuery="";
let editingId=null;

const board=document.getElementById("board");

function save(){
localStorage.setItem("hrmsPro",JSON.stringify(candidates));
}

function render(){
board.innerHTML="";

let filtered=candidates.filter(c=>
c.name.toLowerCase().includes(searchQuery) ||
c.role.toLowerCase().includes(searchQuery)
);

document.getElementById("stats").innerHTML=
`Total: ${candidates.length} | Selected: ${candidates.filter(c=>c.stage===2).length} | Joined: ${candidates.filter(c=>c.stage===3).length}`;

stages.forEach((stage,stageIndex)=>{
const col=document.createElement("div");
col.className="column";
col.innerHTML=`<h3>${stage}</h3><div class="counter">${filtered.filter(c=>c.stage===stageIndex).length}</div>`;

filtered.filter(c=>c.stage===stageIndex).forEach(c=>{
const card=document.createElement("div");
card.className="card";
card.draggable=true;

card.innerHTML=`
<strong>${c.name}</strong>
<small> – ${c.role}</small>
<span class="priority ${c.priority}">${c.priority}</span>
<div class="actions">
<button class="edit">Edit</button>
<button class="delete">Delete</button>
</div>
`;

card.querySelector(".edit").onclick=e=>{
e.stopPropagation();
openEdit(c);
};

card.querySelector(".delete").onclick=e=>{
e.stopPropagation();
if(confirm("Delete candidate?")){
candidates=candidates.filter(x=>x.id!==c.id);
save();render();
}
};

card.ondragstart=()=>{
card.classList.add("dragging");
card.dataset.id=c.id;
};

col.ondragover=e=>e.preventDefault();
col.ondrop=e=>{
const id=+document.querySelector(".dragging").dataset.id;
moveCandidate(id,stageIndex);
};

col.appendChild(card);
});

board.appendChild(col);
});
}

function addCandidate(){
const name=nameInput.value.trim();
const role=roleInput.value.trim();
const priority=priorityInput.value;
if(!name||!role)return;

candidates.push({
id:Date.now(),
name,
role,
priority,
stage:0
});

nameInput.value="";
roleInput.value="";
save();render();
}

function moveCandidate(id,newStage){
const c=candidates.find(x=>x.id===id);
if(!c)return;
c.stage=newStage;
save();render();
}

function openEdit(c){
editingId=c.id;
editName.value=c.name;
editRole.value=c.role;
editPriority.value=c.priority;
modal.classList.add("active");
}

function saveEdit(){
const c=candidates.find(x=>x.id===editingId);
if(!c)return;
c.name=editName.value;
c.role=editRole.value;
c.priority=editPriority.value;
modal.classList.remove("active");
save();render();
}

function closeModal(){
modal.classList.remove("active");
}

searchInput.oninput=e=>{
searchQuery=e.target.value.toLowerCase();
render();
};

function exportData(){
const data=JSON.stringify(candidates,null,2);
const blob=new Blob([data],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="hrms-data.json";
a.click();
}

function clearAll(){
if(confirm("Clear all data?")){
candidates=[];
save();render();
}
}

render();
</script>

</body>
</html>
