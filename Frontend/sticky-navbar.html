<!DOCTYPE html>
<html>
<head>
<title>Sticky Navbar</title>

<style>
body{
margin:0;
font-family:Arial;
}

.navbar{
background:#111;
padding:15px;
position:sticky;
top:0;
}

.navbar a{
color:white;
text-decoration:none;
margin:15px;
}

.content{
height:2000px;
padding:20px;
}
</style>

</head>

<body>

<div class="navbar">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Blog</a>
<a href="#">Contact</a>
</div>

<div class="content">
Scroll to see sticky navbar effect
</div>

</body>
</html>
