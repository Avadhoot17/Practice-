<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberTask</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --magenta: #ff00c8;
    --yellow: #ffe600;
    --bg: #03050a;
    --bg2: #080d14;
    --bg3: #0d1520;
    --text: #c8e0f0;
    --muted: #4a6070;
    --green: #00ff88;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,245,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,245,255,0.02) 40px);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(255,0,200,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .container {
    width: 100%; max-width: 640px;
    position: relative; z-index: 1;
  }

  .header {
    margin-bottom: 32px;
  }

  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 3px;
    opacity: 0.7;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,245,255,0.4), 0 0 60px rgba(0,245,255,0.2);
  }

  .header h1 span { color: var(--cyan); }

  .stats-row {
    display: flex; gap: 24px;
    margin-top: 16px;
  }

  .stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .stat strong {
    color: var(--cyan);
    font-size: 16px;
    display: block;
  }

  .input-row {
    display: flex; gap: 0;
    margin-bottom: 28px;
    border: 1px solid var(--cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.03);
    position: relative;
  }

  .input-row::before {
    content: '//';
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--cyan);
    opacity: 0.5;
    pointer-events: none;
  }

  #taskInput {
    flex: 1;
    background: var(--bg3);
    border: none;
    outline: none;
    padding: 16px 16px 16px 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  #taskInput::placeholder { color: var(--muted); }

  .priority-sel {
    background: var(--bg3);
    border: none;
    border-left: 1px solid rgba(0,245,255,0.2);
    outline: none;
    padding: 0 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    cursor: pointer;
  }

  .add-btn {
    padding: 16px 20px;
    background: var(--cyan);
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--bg);
    text-transform: uppercase;
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, 100% 100%, 0% 100%);
  }

  .add-btn:hover {
    background: #fff;
    box-shadow: 0 0 20px rgba(0,245,255,0.6);
  }

  .filter-row {
    display: flex; gap: 8px;
    margin-bottom: 20px;
  }

  .filter-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .filter-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(0,245,255,0.2);
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px;
    background: var(--bg2);
    border: 1px solid rgba(0,245,255,0.08);
    border-left: 3px solid var(--cyan);
    cursor: pointer;
    transition: all 0.2s;
    animation: slideIn 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 0;
    background: rgba(0,245,255,0.04);
    transition: width 0.3s;
  }

  .task-item:hover::before { width: 100%; }
  .task-item:hover { border-color: rgba(0,245,255,0.3); }

  .task-item[data-priority="HIGH"] { border-left-color: var(--magenta); }
  .task-item[data-priority="MED"]  { border-left-color: var(--yellow); }
  .task-item[data-priority="LOW"]  { border-left-color: var(--muted); }

  .task-item.done {
    opacity: 0.4;
    border-left-color: var(--green) !important;
  }

  .task-check {
    width: 20px; height: 20px;
    border: 1px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    transition: all 0.2s;
  }

  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }

  .task-item.done .task-text { text-decoration: line-through; }

  .task-meta {
    display: flex; align-items: center; gap: 10px;
  }

  .priority-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border: 1px solid;
    opacity: 0.8;
  }

  [data-priority="HIGH"] .priority-badge { color: var(--magenta); border-color: var(--magenta); }
  [data-priority="MED"]  .priority-badge { color: var(--yellow);  border-color: var(--yellow); }
  [data-priority="LOW"]  .priority-badge { color: var(--muted);   border-color: var(--muted); }

  .task-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .del-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 2px 4px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    display: none;
  }

  .scanline {
    position: fixed; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
    animation: scan 4s linear infinite;
    pointer-events: none;
    z-index: 100;
  }

  @keyframes scan {
    from { top: -2px; }
    to   { top: 100vh; }
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="container">
  <div class="header">
    <div class="header-tag">// TASK_MANAGER v2.077</div>
    <h1>CYBER<span>TASK</span></h1>
    <div class="stats-row">
      <div class="stat"><strong id="statTotal">0</strong>TOTAL</div>
      <div class="stat"><strong id="statDone">0</strong>DONE</div>
      <div class="stat"><strong id="statPending">0</strong>PENDING</div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Enter mission objective...">
    <select class="priority-sel" id="prioritySel">
      <option value="HIGH">HIGH</option>
      <option value="MED" selected>MED</option>
      <option value="LOW">LOW</option>
    </select>
    <button class="add-btn" onclick="addTask()">ADD ›</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">PENDING</button>
    <button class="filter-btn" onclick="setFilter('done', this)">DONE</button>
    <button class="filter-btn" onclick="setFilter('HIGH', this)">!! HIGH</button>
  </div>

  <div class="task-list" id="taskList"></div>
  <div class="empty" id="empty">[ NO TASKS IN QUEUE ]</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('cybertasks') || '[]');
let filter = 'all';

function save() { localStorage.setItem('cybertasks', JSON.stringify(tasks)); }

function fmt(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  const priority = document.getElementById('prioritySel').value;
  tasks.unshift({ id: Date.now(), text, priority, done: false, ts: Date.now() });
  save(); render(); input.value = '';
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('taskList');
  const empty = document.getElementById('empty');

  let visible = tasks;
  if (filter === 'pending') visible = tasks.filter(t => !t.done);
  else if (filter === 'done') visible = tasks.filter(t => t.done);
  else if (filter === 'HIGH') visible = tasks.filter(t => t.priority === 'HIGH');

  list.innerHTML = '';
  if (!visible.length) { empty.style.display = 'block'; } else { empty.style.display = 'none'; }

  visible.forEach(t => {
    const el = document.createElement('div');
    el.className = 'task-item' + (t.done ? ' done' : '');
    el.setAttribute('data-priority', t.priority);
    el.innerHTML = `
      <div class="task-check" onclick="toggleDone(${t.id})">${t.done ? '✓' : ''}</div>
      <div class="task-text">${t.text}</div>
      <div class="task-meta">
        <span class="priority-badge">${t.priority}</span>
        <span class="task-time">${fmt(t.ts)}</span>
      </div>
      <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
    `;
    list.appendChild(el);
  });

  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statDone').textContent = tasks.filter(t => t.done).length;
  document.getElementById('statPending').textContent = tasks.filter(t => !t.done).length;
}

render();
</script>
</body>
</html>
