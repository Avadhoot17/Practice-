<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpendSmart – Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f9a825;
    --text: #eef0f8;
    --text2: #8b90a8;
    --red: #ff4d6d;
    --green: #43e97b;
    --card-shadow: 0 4px 32px rgba(0,0,0,0.4);
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,101,132,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── LAYOUT ── */
  .app { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .header-date { color: var(--text2); font-size: 13px; }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .summary-card:hover { transform: translateY(-3px); box-shadow: var(--card-shadow); }
  .summary-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--c, var(--accent));
  }
  .summary-card.balance { --c: var(--accent); }
  .summary-card.income  { --c: var(--green); }
  .summary-card.expense { --c: var(--red); }
  .summary-card.savings { --c: var(--accent4); }
  .card-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .card-amount { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; }
  .card-amount.pos { color: var(--green); }
  .card-amount.neg { color: var(--red); }
  .card-amount.neutral { color: var(--text); }
  .card-amount.yel { color: var(--accent4); }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 8px; }
  .card-icon { position: absolute; right: 18px; top: 18px; font-size: 22px; opacity: 0.5; }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* ── ADD EXPENSE PANEL ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 8px;
  }

  /* form */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { margin-bottom: 16px; }
  .form-group.full { grid-column: 1 / -1; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.7px; }
  input, select, textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 11px 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  select option { background: var(--surface2); }
  textarea { resize: none; height: 72px; }

  /* type toggle */
  .type-toggle { display: flex; gap: 10px; margin-bottom: 16px; }
  .type-btn {
    flex: 1; padding: 10px; border-radius: var(--radius-sm);
    border: 2px solid var(--border); background: transparent;
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .type-btn.active.expense { border-color: var(--red); background: rgba(255,77,109,0.12); color: var(--red); }
  .type-btn.active.income  { border-color: var(--green); background: rgba(67,233,123,0.12); color: var(--green); }

  /* category pills */
  .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .cat-pill {
    padding: 6px 13px; border-radius: 30px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text2); font-size: 13px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .cat-pill.active { border-color: var(--accent); background: rgba(108,99,255,0.15); color: var(--accent); }

  /* submit btn */
  .btn-add {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #9b59b6);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    margin-top: 4px;
  }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: scale(0.98); }

  /* ── RIGHT SIDE ── */
  .right-col { display: flex; flex-direction: column; gap: 24px; }

  /* ── CHART ── */
  .chart-wrap { position: relative; }
  canvas { width: 100% !important; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 18px;
  }
  .filter-btn {
    padding: 7px 16px; border-radius: 30px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active { border-color: var(--accent); background: rgba(108,99,255,0.15); color: var(--accent); }
  .search-box {
    flex: 1; min-width: 140px; padding: 7px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 30px; color: var(--text); font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }

  /* ── TRANSACTION LIST ── */
  .txn-list { display: flex; flex-direction: column; gap: 10px; }
  .txn-empty {
    text-align: center; padding: 60px 20px; color: var(--text2);
    font-size: 15px;
  }
  .txn-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .txn-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .txn-item:hover { transform: translateX(4px); box-shadow: 0 2px 16px rgba(0,0,0,0.3); }

  .txn-cat-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: var(--surface2);
  }
  .txn-info { flex: 1; min-width: 0; }
  .txn-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .txn-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .txn-amount.pos { color: var(--green); }
  .txn-amount.neg { color: var(--red); }
  .txn-del {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 16px; padding: 4px; border-radius: 6px; flex-shrink: 0;
    transition: color 0.2s, background 0.2s;
  }
  .txn-del:hover { color: var(--red); background: rgba(255,77,109,0.1); }

  /* ── BUDGET SECTION ── */
  .budget-list { display: flex; flex-direction: column; gap: 12px; }
  .budget-item {}
  .budget-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 14px; }
  .budget-cat { display: flex; align-items: center; gap: 6px; }
  .budget-nums { font-size: 13px; color: var(--text2); }
  .budget-nums span { color: var(--text); font-weight: 500; }
  .progress-track {
    height: 8px; background: var(--surface2); border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 10px; transition: width 0.6s ease;
    background: var(--accent);
  }
  .progress-fill.warn { background: var(--accent4); }
  .progress-fill.danger { background: var(--red); }

  /* ── TABS ── */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface2); border-radius: 12px; padding: 4px; }
  .tab {
    flex: 1; padding: 9px; border-radius: 9px; border: none; background: none;
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 30px; padding: 12px 24px;
    color: var(--text); font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; z-index: 999; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px; width: 420px; max-width: 95vw;
    transform: scale(0.9); transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 12px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: none; color: var(--text2); font-size: 15px; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-confirm {
    flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-confirm:hover { opacity: 0.85; }

  /* ── EXPORT BTN ── */
  .btn-export {
    padding: 9px 18px; border-radius: 30px; border: 1.5px solid var(--border);
    background: none; color: var(--text2); font-size: 13px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  /* responsive */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .card-amount { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">💸</div>
      <div class="logo-text">Spend<span>Smart</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="header-date" id="headerDate"></span>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-export" onclick="openBudgetModal()">🎯 Set Budget</button>
    </div>
  </header>

  <!-- SUMMARY CARDS -->
  <div class="summary-grid">
    <div class="summary-card balance">
      <div class="card-icon">⚖️</div>
      <div class="card-label">Net Balance</div>
      <div class="card-amount neutral" id="sumBalance">₹0</div>
      <div class="card-sub" id="sumBalanceSub">All time</div>
    </div>
    <div class="summary-card income">
      <div class="card-icon">📈</div>
      <div class="card-label">Total Income</div>
      <div class="card-amount pos" id="sumIncome">₹0</div>
      <div class="card-sub" id="sumIncomeSub">0 entries</div>
    </div>
    <div class="summary-card expense">
      <div class="card-icon">📉</div>
      <div class="card-label">Total Expenses</div>
      <div class="card-amount neg" id="sumExpense">₹0</div>
      <div class="card-sub" id="sumExpenseSub">0 entries</div>
    </div>
    <div class="summary-card savings">
      <div class="card-icon">🏦</div>
      <div class="card-label">Savings Rate</div>
      <div class="card-amount yel" id="sumSavings">0%</div>
      <div class="card-sub">of income saved</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT: Add + History -->
    <div>
      <!-- Add Panel -->
      <div class="panel" style="margin-bottom:24px">
        <div class="panel-title">✚ Add Transaction</div>

        <!-- Type Toggle -->
        <div class="type-toggle">
          <button class="type-btn active expense" onclick="setType('expense',this)">💸 Expense</button>
          <button class="type-btn income" onclick="setType('income',this)">💰 Income</button>
        </div>

        <!-- Category pills -->
        <div id="catGrid" class="cat-grid"></div>

        <div class="form-row">
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="fDesc" placeholder="e.g. Morning coffee" />
          </div>
          <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" id="fAmt" placeholder="0" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="fDate" />
          </div>
          <div class="form-group">
            <label>Payment Mode</label>
            <select id="fMode">
              <option>Cash</option>
              <option>Card</option>
              <option>UPI</option>
              <option>Net Banking</option>
              <option>Wallet</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Note (optional)</label>
            <textarea id="fNote" placeholder="Any extra details…"></textarea>
          </div>
        </div>

        <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
      </div>

      <!-- History Panel -->
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <div class="panel-title" style="margin:0">📋 Transaction History</div>
          <button class="btn-export" onclick="clearAll()" style="color:var(--red);border-color:var(--red)">🗑 Clear All</button>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('expense',this)">Expenses</button>
          <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
          <input class="search-box" id="searchBox" placeholder="🔍 Search…" oninput="renderList()" />
        </div>

        <div class="txn-list" id="txnList"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">

      <!-- Chart Panel -->
      <div class="panel">
        <div class="tabs">
          <button class="tab active" onclick="switchChart('donut',this)">By Category</button>
          <button class="tab" onclick="switchChart('bar',this)">Monthly</button>
          <button class="tab" onclick="switchChart('trend',this)">Trend</button>
        </div>
        <div class="chart-wrap">
          <canvas id="mainChart" height="240"></canvas>
        </div>
      </div>

      <!-- Budget Panel -->
      <div class="panel">
        <div class="panel-title">🎯 Budget Tracker</div>
        <div class="budget-list" id="budgetList"></div>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Budget Modal -->
<div class="modal-overlay" id="budgetModal">
  <div class="modal">
    <div class="modal-title">🎯 Set Monthly Budget</div>
    <div id="budgetForm"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeBudgetModal()">Cancel</button>
      <button class="btn-confirm" onclick="saveBudgets()">Save Budgets</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────
const CATS_EXPENSE = [
  {id:'food',    label:'🍔 Food',      color:'#ff6584'},
  {id:'travel',  label:'🚗 Travel',    color:'#6c63ff'},
  {id:'shopping',label:'🛍 Shopping',  color:'#f9a825'},
  {id:'health',  label:'💊 Health',    color:'#43e97b'},
  {id:'bills',   label:'🧾 Bills',     color:'#36cfc9'},
  {id:'entertain',label:'🎬 Fun',      color:'#ff9a3c'},
  {id:'edu',     label:'📚 Education', color:'#9b59b6'},
  {id:'other',   label:'📦 Other',     color:'#8b90a8'},
];
const CATS_INCOME = [
  {id:'salary',  label:'💼 Salary',   color:'#43e97b'},
  {id:'freelance',label:'💻 Freelance',color:'#6c63ff'},
  {id:'invest',  label:'📈 Invest',   color:'#f9a825'},
  {id:'gift',    label:'🎁 Gift',     color:'#ff6584'},
  {id:'other',   label:'📦 Other',    color:'#8b90a8'},
];

let txns   = JSON.parse(localStorage.getItem('ss_txns') || '[]');
let budgets= JSON.parse(localStorage.getItem('ss_budgets') || '{}');
let curType   = 'expense';
let curCat    = CATS_EXPENSE[0].id;
let curFilter = 'all';
let curChart  = 'donut';
let chartInst = null;

// ── INIT ──────────────────────────────────────────────────
document.getElementById('fDate').value = today();
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
renderCats();
renderAll();

function today() {
  return new Date().toISOString().split('T')[0];
}

// ── CATEGORY PILLS ────────────────────────────────────────
function renderCats() {
  const cats = curType === 'expense' ? CATS_EXPENSE : CATS_INCOME;
  if (!cats.find(c=>c.id===curCat)) curCat = cats[0].id;
  document.getElementById('catGrid').innerHTML = cats.map(c=>
    `<button class="cat-pill${c.id===curCat?' active':''}" onclick="selectCat('${c.id}',this)">${c.label}</button>`
  ).join('');
}

function selectCat(id, el) {
  curCat = id;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function setType(t, el) {
  curType = t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active','expense','income'));
  el.classList.add('active', t);
  renderCats();
}

// ── ADD TRANSACTION ───────────────────────────────────────
function addTransaction() {
  const desc = document.getElementById('fDesc').value.trim();
  const amt  = parseFloat(document.getElementById('fAmt').value);
  const date = document.getElementById('fDate').value;
  const mode = document.getElementById('fMode').value;
  const note = document.getElementById('fNote').value.trim();

  if (!desc) return toast('⚠️ Please enter a description');
  if (!amt || amt <= 0) return toast('⚠️ Please enter a valid amount');
  if (!date) return toast('⚠️ Please pick a date');

  const t = {
    id: Date.now(),
    type: curType,
    cat: curCat,
    desc, amt, date, mode, note
  };
  txns.unshift(t);
  save();
  renderAll();

  // Reset form
  document.getElementById('fDesc').value = '';
  document.getElementById('fAmt').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fDate').value = today();

  toast(`✅ ${curType === 'expense' ? 'Expense' : 'Income'} of ₹${fmt(amt)} added!`);
}

// ── RENDER ALL ────────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderList();
  renderChart();
  renderBudget();
}

// ── SUMMARY ───────────────────────────────────────────────
function renderSummary() {
  const income  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amt,0);
  const expense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amt,0);
  const balance = income - expense;
  const savings = income > 0 ? Math.max(0, Math.round((balance/income)*100)) : 0;

  document.getElementById('sumBalance').textContent = `₹${fmt(Math.abs(balance))}`;
  document.getElementById('sumBalance').className = 'card-amount ' + (balance>=0?'pos':'neg');
  document.getElementById('sumIncome').textContent  = `₹${fmt(income)}`;
  document.getElementById('sumExpense').textContent = `₹${fmt(expense)}`;
  document.getElementById('sumSavings').textContent = `${savings}%`;
  document.getElementById('sumIncomeSub').textContent  = `${txns.filter(t=>t.type==='income').length} entries`;
  document.getElementById('sumExpenseSub').textContent = `${txns.filter(t=>t.type==='expense').length} entries`;
}

// ── TRANSACTION LIST ──────────────────────────────────────
function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = txns.filter(t => {
    if (curFilter !== 'all' && t.type !== curFilter) return false;
    if (q && !t.desc.toLowerCase().includes(q) && !t.cat.includes(q)) return false;
    return true;
  });

  const el = document.getElementById('txnList');
  if (!list.length) {
    el.innerHTML = `<div class="txn-empty"><div class="empty-icon">🔍</div>No transactions found.</div>`;
    return;
  }

  el.innerHTML = list.map(t => {
    const cat = [...CATS_EXPENSE,...CATS_INCOME].find(c=>c.id===t.cat) || {label:'📦',color:'#8b90a8'};
    const sign = t.type==='income' ? '+' : '-';
    const cls  = t.type==='income' ? 'pos' : 'neg';
    return `
    <div class="txn-item">
      <div class="txn-cat-icon" style="background:${cat.color}22">${cat.label.split(' ')[0]}</div>
      <div class="txn-info">
        <div class="txn-name">${esc(t.desc)}</div>
        <div class="txn-meta">${t.date} · ${t.mode} · <span style="color:var(--accent)">${cat.label}</span>${t.note?' · '+esc(t.note):''}</div>
      </div>
      <div class="txn-amount ${cls}">${sign}₹${fmt(t.amt)}</div>
      <button class="txn-del" onclick="deleteTxn(${t.id})" title="Delete">✕</button>
    </div>`;
  }).join('');
}

function deleteTxn(id) {
  txns = txns.filter(t=>t.id!==id);
  save();
  renderAll();
  toast('🗑 Transaction deleted');
}

function clearAll() {
  if (txns.length === 0) return toast('Nothing to clear!');
  if (confirm('Clear all transactions? This cannot be undone.')) {
    txns = [];
    save();
    renderAll();
    toast('🗑 All transactions cleared');
  }
}

// ── CHARTS ────────────────────────────────────────────────
function switchChart(type, el) {
  curChart = type;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderChart();
}

function renderChart() {
  const canvas = document.getElementById('mainChart');
  const ctx = canvas.getContext('2d');
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  if (curChart === 'donut') renderDonut(ctx);
  else if (curChart === 'bar') renderBar(ctx);
  else renderTrend(ctx);
}

function renderDonut(ctx) {
  const exp = txns.filter(t=>t.type==='expense');
  if (!exp.length) { noData(ctx); return; }
  const bycat = {};
  exp.forEach(t=>{ bycat[t.cat]=(bycat[t.cat]||0)+t.amt; });
  const labels=[], data=[], colors=[];
  Object.entries(bycat).forEach(([k,v])=>{
    const cat = CATS_EXPENSE.find(c=>c.id===k)||{label:k,color:'#888'};
    labels.push(cat.label); data.push(v); colors.push(cat.color);
  });
  chartInst = new Chart(ctx, {
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:8}]},
    options:{
      plugins:{legend:{labels:{color:'#8b90a8',font:{family:'DM Sans'},boxWidth:12}}},
      cutout:'65%',animation:{animateScale:true}
    }
  });
}

function renderBar(ctx) {
  const months = getLast6Months();
  const incData = months.map(m=>txns.filter(t=>t.type==='income'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amt,0));
  const expData = months.map(m=>txns.filter(t=>t.type==='expense'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amt,0));
  chartInst = new Chart(ctx, {
    type:'bar',
    data:{
      labels: months.map(m=>{const d=new Date(m+'-01');return d.toLocaleString('default',{month:'short'})+" '"+d.getFullYear().toString().slice(2);}),
      datasets:[
        {label:'Income', data:incData, backgroundColor:'rgba(67,233,123,0.7)', borderRadius:6},
        {label:'Expense',data:expData, backgroundColor:'rgba(255,77,109,0.7)', borderRadius:6},
      ]
    },
    options:{
      plugins:{legend:{labels:{color:'#8b90a8',font:{family:'DM Sans'},boxWidth:12}}},
      scales:{
        x:{ticks:{color:'#8b90a8'},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#8b90a8',callback:v=>'₹'+fmt(v)},grid:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });
}

function renderTrend(ctx) {
  const sorted = [...txns].filter(t=>t.type==='expense').sort((a,b)=>a.date.localeCompare(b.date));
  if (sorted.length < 2) { noData(ctx); return; }
  let running = 0;
  const labels=[], data=[];
  sorted.forEach(t=>{ running+=t.amt; labels.push(t.date); data.push(running); });
  chartInst = new Chart(ctx, {
    type:'line',
    data:{labels,datasets:[{
      label:'Cumulative Spend',
      data,
      borderColor:'#6c63ff',
      backgroundColor:'rgba(108,99,255,0.12)',
      fill:true, tension:0.4, pointRadius:3, pointBackgroundColor:'#6c63ff'
    }]},
    options:{
      plugins:{legend:{labels:{color:'#8b90a8',font:{family:'DM Sans'}}}},
      scales:{
        x:{ticks:{color:'#8b90a8',maxTicksLimit:7},grid:{display:false}},
        y:{ticks:{color:'#8b90a8',callback:v=>'₹'+fmt(v)},grid:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });
}

function noData(ctx) {
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  ctx.fillStyle='#8b90a8'; ctx.textAlign='center'; ctx.font='14px DM Sans';
  ctx.fillText('No data yet — add some transactions!', ctx.canvas.width/2, 120);
}

function getLast6Months() {
  const res=[]; const d=new Date();
  for(let i=5;i>=0;i--){
    const t=new Date(d.getFullYear(),d.getMonth()-i,1);
    res.push(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`);
  }
  return res;
}

// ── BUDGET ────────────────────────────────────────────────
function renderBudget() {
  const thisMonth = today().slice(0,7);
  const el = document.getElementById('budgetList');
  const hasBudgets = Object.keys(budgets).some(k=>budgets[k]>0);
  if (!hasBudgets) {
    el.innerHTML = `<div style="color:var(--text2);font-size:14px;text-align:center;padding:20px 0">
      No budgets set yet. Click <strong>🎯 Set Budget</strong> above to get started!
    </div>`;
    return;
  }
  el.innerHTML = CATS_EXPENSE.filter(c=>budgets[c.id]>0).map(c=>{
    const spent = txns.filter(t=>t.type==='expense'&&t.cat===c.id&&t.date.startsWith(thisMonth)).reduce((s,t)=>s+t.amt,0);
    const bud   = budgets[c.id];
    const pct   = Math.min(100, Math.round((spent/bud)*100));
    const cls   = pct>=100?'danger':pct>=80?'warn':'';
    return `
    <div class="budget-item">
      <div class="budget-head">
        <div class="budget-cat">${c.label}</div>
        <div class="budget-nums">₹<span>${fmt(spent)}</span> / ₹${fmt(bud)} <span style="color:${cls?'var(--red)':'var(--text2)'}">(${pct}%)</span></div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${cls}" style="width:${pct}%;background:${c.color}"></div>
      </div>
    </div>`;
  }).join('');
}

function openBudgetModal() {
  document.getElementById('budgetForm').innerHTML = CATS_EXPENSE.map(c=>`
    <div class="form-group">
      <label>${c.label} Monthly Budget (₹)</label>
      <input type="number" id="bud_${c.id}" value="${budgets[c.id]||''}" placeholder="0 = no limit" min="0" />
    </div>
  `).join('');
  document.getElementById('budgetModal').classList.add('open');
}
function closeBudgetModal() {
  document.getElementById('budgetModal').classList.remove('open');
}
function saveBudgets() {
  CATS_EXPENSE.forEach(c=>{
    const v = parseFloat(document.getElementById('bud_'+c.id).value)||0;
    if(v>0) budgets[c.id]=v; else delete budgets[c.id];
  });
  localStorage.setItem('ss_budgets',JSON.stringify(budgets));
  closeBudgetModal();
  renderBudget();
  toast('✅ Budgets saved!');
}

// ── EXPORT CSV ────────────────────────────────────────────
function exportCSV() {
  if(!txns.length) return toast('No transactions to export');
  const rows = [['Date','Type','Category','Description','Amount','Mode','Note']];
  txns.forEach(t=>{
    const cat=[...CATS_EXPENSE,...CATS_INCOME].find(c=>c.id===t.cat)||{label:t.cat};
    rows.push([t.date,t.type,cat.label,t.desc,t.amt,t.mode,t.note]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`spendsmart_${today()}.csv`; a.click();
  toast('📥 CSV exported!');
}

// ── HELPERS ───────────────────────────────────────────────
function fmt(n) {
  return Number(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function save() {
  localStorage.setItem('ss_txns', JSON.stringify(txns));
}
let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// Close modal on overlay click
document.getElementById('budgetModal').addEventListener('click',function(e){
  if(e.target===this) closeBudgetModal();
});
</script>
