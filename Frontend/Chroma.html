<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma — Palette Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root { --bg: #f7f4ef; --text: #1a1510; --muted: #8a8070; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .blob-bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
    filter: blur(80px);
    opacity: 0.35;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(30px, -20px) scale(1.1); }
    66%  { transform: translate(-20px, 30px) scale(0.95); }
    100% { transform: translate(0,0) scale(1); }
  }

  .ui {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  header {
    padding: 40px 48px 0;
    display: flex; align-items: flex-end; justify-content: space-between;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--text);
    line-height: 1;
  }

  .logo em { font-style: italic; opacity: 0.5; }

  .subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 6px;
  }

  .main {
    flex: 1;
    padding: 40px 48px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 32px;
  }

  .controls {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }

  .mood-chips {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .chip {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1.5px solid rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    color: var(--text);
  }

  .chip.active, .chip:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .gen-btn {
    margin-left: auto;
    padding: 10px 28px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .gen-btn:hover { opacity: 0.7; transform: scale(0.98); }

  .palette-area {
    display: flex;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.12);
    min-height: 360px;
  }

  .swatch {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 16px;
    transition: flex 0.5s cubic-bezier(0.34,1.56,0.64,1), background 1.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .swatch:hover { flex: 2.5; }

  .swatch-info {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s 0.1s;
  }

  .swatch:hover .swatch-info { opacity: 1; transform: translateY(0); }

  .swatch-hex {
    font-family: 'DM Sans', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    mix-blend-mode: overlay;
    background: rgba(255,255,255,0.3);
    color: white;
    padding: 4px 10px;
    border-radius: 100px;
    backdrop-filter: blur(10px);
    display: inline-block;
    margin-bottom: 6px;
  }

  .swatch-name {
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }

  .copy-flash {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.25);
    opacity: 0;
    pointer-events: none;
  }

  .copy-flash.flash {
    animation: copyFlash 0.4s ease;
  }

  @keyframes copyFlash {
    0%   { opacity: 0; }
    30%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .export-row {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }

  .export-preview {
    display: flex; gap: 10px; align-items: center;
  }

  .mini-swatch {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 3px solid var(--bg);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: background 1.2s ease;
  }

  .palette-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--muted);
  }

  .export-btns { display: flex; gap: 10px; }

  .ex-btn {
    padding: 8px 20px;
    border: 1.5px solid rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.6);
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .ex-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="blob-bg" id="blobBg"></div>

<div class="ui">
  <header>
    <div class="logo">Chroma<em>.</em></div>
    <div class="subtitle">Palette Generator</div>
  </header>

  <div class="main">
    <div class="controls">
      <div class="mood-chips" id="moodChips">
        <div class="chip active" data-mood="sunset">Sunset</div>
        <div class="chip" data-mood="ocean">Ocean</div>
        <div class="chip" data-mood="forest">Forest</div>
        <div class="chip" data-mood="neon">Neon</div>
        <div class="chip" data-mood="earth">Earth</div>
        <div class="chip" data-mood="pastel">Pastel</div>
        <div class="chip" data-mood="mono">Mono</div>
      </div>
      <button class="gen-btn" onclick="generate()">Generate ↻</button>
    </div>

    <div class="palette-area" id="paletteArea"></div>

    <div class="export-row">
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="export-preview" id="miniSwatches"></div>
        <div class="palette-name" id="paletteName">Golden Hour</div>
      </div>
      <div class="export-btns">
        <button class="ex-btn" onclick="copyCSS()">Copy CSS</button>
        <button class="ex-btn" onclick="copyHex()">Copy HEX</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const MOODS = {
  sunset: {
    name: ['Golden Hour', 'Dusk Reverie', 'Amber Glow', 'Twilight Bloom'],
    palettes: [
      ['#ff6b35','#f7c59f','#ffbe0b','#e63946','#1d3557'],
      ['#f72585','#b5179e','#ff9e00','#fb5607','#ffbe0b'],
      ['#e07a5f','#f2cc8f','#81b29a','#3d405b','#f4f1de'],
    ]
  },
  ocean: {
    name: ['Deep Tide', 'Coastal Haze', 'Reef Dreams', 'Brine & Salt'],
    palettes: [
      ['#03045e','#0077b6','#00b4d8','#90e0ef','#caf0f8'],
      ['#006d77','#83c5be','#edf6f9','#ffddd2','#e29578'],
      ['#264653','#2a9d8f','#e9c46a','#f4a261','#e76f51'],
    ]
  },
  forest: {
    name: ['Verdant Calm', 'Moss & Bark', 'Old Growth', 'Fern Vale'],
    palettes: [
      ['#1b4332','#2d6a4f','#52b788','#b7e4c7','#d8f3dc'],
      ['#344e41','#3a5a40','#588157','#a3b18a','#dad7cd'],
      ['#606c38','#283618','#fefae0','#dda15e','#bc6c25'],
    ]
  },
  neon: {
    name: ['Synthwave', 'Neon District', 'Cyber Bloom', 'Glitch City'],
    palettes: [
      ['#ff0090','#7400b8','#00f5ff','#39ff14','#ff6600'],
      ['#ff00c8','#00ffff','#ffe600','#ff4d00','#9600ff'],
      ['#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'],
    ]
  },
  earth: {
    name: ['Desert Wind', 'Clay & Stone', 'Prairie Sun', 'Sienna Dusk'],
    palettes: [
      ['#8b4513','#d2691e','#f5deb3','#deb887','#a0522d'],
      ['#c9a96e','#8b7355','#f2e8d5','#7c6d5a','#e8d5b7'],
      ['#582f0e','#7f4f24','#936639','#a68a64','#b6ad90'],
    ]
  },
  pastel: {
    name: ['Cotton Candy', 'Soft Morning', 'Petal Haze', 'Blush Garden'],
    palettes: [
      ['#ffb3c6','#ffd6ff','#bde0fe','#caffbf','#fdffb6'],
      ['#f9c6d0','#f6d5b8','#f3e6c2','#c9e8d1','#b8d8e8'],
      ['#e8b4b8','#d4a5c9','#a9c4d0','#b4d4a5','#f0d4a5'],
    ]
  },
  mono: {
    name: ['Ash & Smoke', 'Graphite', 'Ivory Tower', 'Silver Lining'],
    palettes: [
      ['#212529','#495057','#868e96','#ced4da','#f8f9fa'],
      ['#03071e','#370617','#6a040f','#9d0208','#d62828'],
      ['#1a1a2e','#16213e','#0f3460','#533483','#e94560'],
    ]
  }
};

let currentMood = 'sunset';
let currentPalette = [];

function pickName(mood) {
  const names = MOODS[mood].name;
  return names[Math.floor(Math.random() * names.length)];
}

function generate(mood) {
  if (!mood) mood = currentMood;
  currentMood = mood;

  const palettes = MOODS[mood].palettes;
  currentPalette = palettes[Math.floor(Math.random() * palettes.length)];
  const name = pickName(mood);

  document.getElementById('paletteName').textContent = name;

  // Update blobs
  const blobBg = document.getElementById('blobBg');
  blobBg.innerHTML = '';
  currentPalette.forEach((col, i) => {
    const b = document.createElement('div');
    b.className = 'blob';
    const size = 300 + i * 80;
    b.style.cssText = `
      width:${size}px;height:${size}px;
      background:${col};
      left:${10 + i * 18}%;top:${10 + (i % 2 === 0 ? 10 : 40)}%;
      animation-duration:${7 + i * 1.5}s;
      animation-delay:${-i * 2}s;
    `;
    blobBg.appendChild(b);
  });

  // Update swatches
  const area = document.getElementById('paletteArea');
  area.innerHTML = '';
  currentPalette.forEach((col, i) => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = col;
    s.innerHTML = `
      <div class="copy-flash" id="flash${i}"></div>
      <div class="swatch-info">
        <div class="swatch-hex">${col.toUpperCase()}</div>
        <div class="swatch-name">${colorName(col)}</div>
      </div>
    `;
    s.onclick = () => {
      navigator.clipboard.writeText(col).catch(()=>{});
      document.getElementById('flash' + i).classList.remove('flash');
      void document.getElementById('flash' + i).offsetWidth;
      document.getElementById('flash' + i).classList.add('flash');
      showToast('Copied ' + col);
    };
    area.appendChild(s);
  });

  // Mini swatches
  const mini = document.getElementById('miniSwatches');
  mini.innerHTML = '';
  currentPalette.forEach(col => {
    const m = document.createElement('div');
    m.className = 'mini-swatch';
    m.style.background = col;
    mini.appendChild(m);
  });
}

function colorName(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const h = rgbToHsl(r,g,b)[0];
  if (r===g&&g===b) return r<64?'Onyx':r<128?'Graphite':r<200?'Silver':'Ivory';
  if (h<30) return 'Crimson';
  if (h<60) return 'Amber';
  if (h<90) return 'Olive';
  if (h<150) return 'Emerald';
  if (h<195) return 'Teal';
  if (h<240) return 'Cobalt';
  if (h<270) return 'Indigo';
  if (h<300) return 'Violet';
  if (h<330) return 'Magenta';
  return 'Rose';
}

function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h;
  if(max===min) h=0;
  else if(max===r) h=((g-b)/(max-min)+6)%6*60;
  else if(max===g) h=((b-r)/(max-min)+2)*60;
  else h=((r-g)/(max-min)+4)*60;
  return [h];
}

function copyCSS() {
  const css = ':root {\n' + currentPalette.map((c,i) => `  --color-${i+1}: ${c};`).join('\n') + '\n}';
  navigator.clipboard.writeText(css).catch(()=>{});
  showToast('CSS variables copied!');
}

function copyHex() {
  navigator.clipboard.writeText(currentPalette.join(', ')).catch(()=>{});
  showToast('HEX values copied!');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Mood chips
document.getElementById('moodChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  generate(chip.dataset.mood);
});

generate('sunset');
</script>
</body>
</html>
