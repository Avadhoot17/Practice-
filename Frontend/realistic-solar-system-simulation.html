<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Solar System (Slow Motion)</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
background:#000;
color:#fff;
display:flex;
height:100vh;
overflow:hidden;
}
#container{flex:1;position:relative}
canvas{display:block}
#panel{
width:280px;
background:#0f172a;
padding:20px;
border-left:1px solid #1e293b;
overflow-y:auto;
}
h2{margin-bottom:10px}
label{font-size:13px}
button,input{width:100%;margin-top:6px}
button{
padding:8px;
background:#38bdf8;
border:none;
font-weight:600;
cursor:pointer;
}
.data{font-size:12px;margin-top:15px;opacity:.8}
</style>
</head>
<body>

<div id="container">
<canvas id="canvas"></canvas>
</div>

<div id="panel">
<h2>Solar System</h2>

<label>Simulation Speed</label>
<input type="range" id="speed" min="0.5" max="5" step="0.1" value="1">

<button id="pauseBtn">Pause</button>

<div class="data" id="planetData"></div>
</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth-280;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let speedMultiplier=1;
let paused=false;

const stars=[];
function createStars(){
stars.length=0;
for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}
}
createStars();

/* ---------- Planet Class ---------- */
class Planet{
constructor(name,color,radius,distance,orbitalPeriod){
this.name=name;
this.color=color;
this.radius=radius;
this.distance=distance;
this.orbitalPeriod=orbitalPeriod;
this.angle=Math.random()*Math.PI*2;
this.rotation=0;
}

update(){
const BASE_SPEED=0.002; // slow & realistic
this.angle+=(BASE_SPEED*speedMultiplier)/this.orbitalPeriod;
this.rotation+=0.003;
}

drawOrbit(center){
ctx.beginPath();
ctx.strokeStyle="rgba(255,255,255,0.1)";
ctx.arc(center.x,center.y,this.distance,0,Math.PI*2);
ctx.stroke();
}

draw(center){
const x=center.x+Math.cos(this.angle)*this.distance;
const y=center.y+Math.sin(this.angle)*this.distance;

ctx.save();
ctx.translate(x,y);
ctx.rotate(this.rotation);

ctx.beginPath();
ctx.fillStyle=this.color;
ctx.arc(0,0,this.radius,0,Math.PI*2);
ctx.fill();

ctx.restore();

ctx.fillStyle="#fff";
ctx.font="11px system-ui";
ctx.fillText(this.name,x+this.radius+4,y);
}

getPosition(center){
return{
x:center.x+Math.cos(this.angle)*this.distance,
y:center.y+Math.sin(this.angle)*this.distance
};
}
}

/* ---------- Planets ---------- */
const planets=[
new Planet("Mercury","#b1b1b1",4,50,0.24),
new Planet("Venus","#eccc9a",6,75,0.62),
new Planet("Earth","#2e8bff",6,100,1),
new Planet("Mars","#b22222",5,130,1.88),
new Planet("Jupiter","#d2b48c",12,170,11.86),
new Planet("Saturn","#deb887",10,210,29.46),
new Planet("Uranus","#66ffff",8,240,84),
new Planet("Neptune","#4169e1",8,270,164.8)
];

const moon={
angle:0,
distance:15,
radius:2
};

/* ---------- Animation ---------- */
function drawStars(){
ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#fff";
for(const s of stars){
ctx.fillRect(s.x,s.y,s.size,s.size);
}
}

function animate(){
requestAnimationFrame(animate);
if(paused) return;

drawStars();

const center={
x:canvas.width/2,
y:canvas.height/2
};

/* Sun */
ctx.beginPath();
ctx.fillStyle="yellow";
ctx.shadowBlur=40;
ctx.shadowColor="orange";
ctx.arc(center.x,center.y,20,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;

for(const p of planets){
p.update();
p.drawOrbit(center);
p.draw(center);

/* Moon */
if(p.name==="Earth"){
const earthPos=p.getPosition(center);
moon.angle+=0.01*speedMultiplier;

const mx=earthPos.x+Math.cos(moon.angle)*moon.distance;
const my=earthPos.y+Math.sin(moon.angle)*moon.distance;

ctx.beginPath();
ctx.fillStyle="#ccc";
ctx.arc(mx,my,moon.radius,0,Math.PI*2);
ctx.fill();
}

/* Saturn Ring */
if(p.name==="Saturn"){
const saturnPos=p.getPosition(center);
ctx.beginPath();
ctx.strokeStyle="rgba(255,255,255,0.5)";
ctx.ellipse(saturnPos.x,saturnPos.y,18,8,0,0,Math.PI*2);
ctx.stroke();
}
}

updatePanel();
}

function updatePanel(){
document.getElementById("planetData").innerHTML=
planets.map(p=>
`<strong>${p.name}</strong><br>
Distance (scaled): ${p.distance}<br>
Orbital Period: ${p.orbitalPeriod} years<br><br>`
).join("");
}

animate();

/* ---------- Controls ---------- */
document.getElementById("speed").oninput=e=>{
speedMultiplier=parseFloat(e.target.value);
};

document.getElementById("pauseBtn").onclick=()=>{
paused=!paused;
document.getElementById("pauseBtn").textContent=
paused?"Resume":"Pause";
};

</script>

</body>
</html>
