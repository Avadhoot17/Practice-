<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Solar System Simulation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
background:#000;
color:#fff;
display:flex;
height:100vh;
overflow:hidden;
}
#container{
flex:1;
position:relative;
}
canvas{
display:block;
}
#panel{
width:300px;
background:#0f172a;
padding:20px;
overflow-y:auto;
border-left:1px solid #1e293b;
}
h2{margin-bottom:10px}
.control{
margin:10px 0;
}
button, input[type=range]{
width:100%;
margin-top:5px;
}
button{
padding:8px;
background:#38bdf8;
border:none;
color:#000;
cursor:pointer;
font-weight:600;
}
label{font-size:13px}
.data{
font-size:12px;
margin-top:10px;
opacity:.8;
}
</style>
</head>
<body>

<div id="container">
<canvas id="canvas"></canvas>
</div>

<div id="panel">
<h2>Solar System</h2>

<div class="control">
<label>Simulation Speed</label>
<input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">
</div>

<div class="control">
<button id="pauseBtn">Pause</button>
</div>

<div class="data" id="planetData"></div>
</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth-300;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const center={x:canvas.width/2,y:canvas.height/2};

let speedMultiplier=1;
let paused=false;

/* ---------- Starfield ---------- */
const stars=[];
for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

/* ---------- Planet Class ---------- */
class Planet{
constructor(name,color,radius,distance,orbitalPeriod){
this.name=name;
this.color=color;
this.radius=radius;
this.distance=distance;
this.orbitalPeriod=orbitalPeriod;
this.angle=Math.random()*Math.PI*2;
this.rotation=0;
}

update(){
this.angle+= (speedMultiplier/this.orbitalPeriod);
this.rotation+=0.02;
}

drawOrbit(){
ctx.beginPath();
ctx.strokeStyle="rgba(255,255,255,0.1)";
ctx.arc(center.x,center.y,this.distance,0,Math.PI*2);
ctx.stroke();
}

draw(){
const x=center.x+Math.cos(this.angle)*this.distance;
const y=center.y+Math.sin(this.angle)*this.distance;

ctx.save();
ctx.translate(x,y);
ctx.rotate(this.rotation);

ctx.beginPath();
ctx.fillStyle=this.color;
ctx.arc(0,0,this.radius,0,Math.PI*2);
ctx.fill();
ctx.restore();

/* Label */
ctx.fillStyle="#fff";
ctx.font="11px system-ui";
ctx.fillText(this.name,x+this.radius+3,y);
}
}

/* ---------- Planets Data ---------- */
const planets=[
new Planet("Mercury","#a9a9a9",4,50,0.24),
new Planet("Venus","#eccc9a",6,75,0.62),
new Planet("Earth","#2e8bff",6,100,1),
new Planet("Mars","#b22222",5,130,1.88),
new Planet("Jupiter","#d2b48c",12,170,11.86),
new Planet("Saturn","#deb887",10,210,29.46),
new Planet("Uranus","#66ffff",8,240,84),
new Planet("Neptune","#4169e1",8,270,164.8)
];

const moon={
angle:0,
distance:15,
radius:2
};

/* ---------- Animation ---------- */
function drawStars(){
ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#fff";
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,s.size,s.size);
});
}

function animate(){
requestAnimationFrame(animate);
if(paused) return;

center.x=canvas.width/2;
center.y=canvas.height/2;

drawStars();

/* Sun */
ctx.beginPath();
ctx.fillStyle="yellow";
ctx.shadowBlur=30;
ctx.shadowColor="orange";
ctx.arc(center.x,center.y,20,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;

/* Planets */
planets.forEach(p=>{
p.update();
p.drawOrbit();
p.draw();

/* Moon for Earth */
if(p.name==="Earth"){
const ex=center.x+Math.cos(p.angle)*p.distance;
const ey=center.y+Math.sin(p.angle)*p.distance;
moon.angle+=0.05*speedMultiplier;

const mx=ex+Math.cos(moon.angle)*moon.distance;
const my=ey+Math.sin(moon.angle)*moon.distance;

ctx.beginPath();
ctx.fillStyle="#ccc";
ctx.arc(mx,my,moon.radius,0,Math.PI*2);
ctx.fill();
}

/* Saturn Ring */
if(p.name==="Saturn"){
const sx=center.x+Math.cos(p.angle)*p.distance;
const sy=center.y+Math.sin(p.angle)*p.distance;
ctx.beginPath();
ctx.strokeStyle="rgba(255,255,255,0.5)";
ctx.ellipse(sx,sy,18,8,0,0,Math.PI*2);
ctx.stroke();
}

});

/* Data Panel */
document.getElementById("planetData").innerHTML=
planets.map(p=>
`${p.name} <br>
Distance: ${p.distance} AU (scaled)<br>
Orbital Period: ${p.orbitalPeriod} years<br><br>`
).join("");

}

animate();

/* ---------- Controls ---------- */
document.getElementById("speed").oninput=e=>{
speedMultiplier=parseFloat(e.target.value);
};

document.getElementById("pauseBtn").onclick=()=>{
paused=!paused;
document.getElementById("pauseBtn").textContent=
paused?"Resume":"Pause";
};

</script>

</body>
</html>
