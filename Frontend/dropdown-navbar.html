<!DOCTYPE html>
<html>
<head>
<title>Dropdown Navbar</title>

<style>
body{
margin:0;
font-family:Arial;
}

.navbar{
background:#444;
padding:15px;
}

.navbar a{
color:white;
text-decoration:none;
margin:15px;
}

.dropdown{
display:inline-block;
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
background:white;
min-width:120px;
}

.dropdown-content a{
display:block;
color:black;
padding:10px;
}

.dropdown:hover .dropdown-content{
display:block;
}
</style>

</head>

<body>

<div class="navbar">

<a href="#">Home</a>

<div class="dropdown">
<a href="#">Services</a>

<div class="dropdown-content">
<a href="#">Web Design</a>
<a href="#">Development</a>
<a href="#">SEO</a>
</div>

</div>

<a href="#">Contact</a>

</div>

</body>
</html>
