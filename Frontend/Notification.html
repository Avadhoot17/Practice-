<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Notification Center</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
background:radial-gradient(circle at top,#1e293b,#020617);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

/* container */
.wrapper{
width:360px;
}

h2{
margin-bottom:16px;
}

/* buttons */
.actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

.actions button{
padding:12px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:500;
transition:.25s;
}

.success{background:#22c55e;color:#022c22;}
.info{background:#38bdf8;color:#022133;}
.warn{background:#facc15;color:#3a2f00;}
.error{background:#ef4444;color:#3a0000;}

.actions button:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* toast container */
.toasts{
display:flex;
flex-direction:column;
gap:12px;
max-height:420px;
overflow:hidden;
}

/* toast */
.toast{
position:relative;
display:flex;
align-items:center;
gap:10px;
justify-content:space-between;
padding:14px 16px;
border-radius:16px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
box-shadow:0 20px 40px rgba(0,0,0,.5);
animation:slideIn .35s ease;
}

.toast-content{
display:flex;
gap:10px;
align-items:center;
}

.toast-icon{
font-size:16px;
}

.toast span{
font-size:13px;
opacity:.9;
}

.toast button{
background:none;
border:none;
color:#fff;
font-size:18px;
cursor:pointer;
opacity:.6;
}

.toast button:hover{
opacity:1;
}

.toast.success{border-left:4px solid #22c55e;}
.toast.info{border-left:4px solid #38bdf8;}
.toast.warn{border-left:4px solid #facc15;}
.toast.error{border-left:4px solid #ef4444;}

/* progress bar */
.progress{
position:absolute;
bottom:0;
left:0;
height:3px;
width:100%;
background:rgba(255,255,255,.2);
}

.progress span{
display:block;
height:100%;
width:100%;
background:#fff;
animation:progress linear forwards;
}

/* animations */
@keyframes slideIn{
from{opacity:0;transform:translateX(30px);}
to{opacity:1;transform:translateX(0);}
}

@keyframes slideOut{
to{opacity:0;transform:translateX(40px);}
}

@keyframes progress{
from{width:100%;}
to{width:0;}
}
</style>
</head>

<body>

<div class="wrapper">
<h2>Notifications</h2>

<div class="actions">
<button class="success" onclick="notify('Saved successfully','success')">Success</button>
<button class="info" onclick="notify('Update available','info')">Info</button>
<button class="warn" onclick="notify('Check your inputs','warn')">Warning</button>
<button class="error" onclick="notify('Something failed','error')">Error</button>
</div>

<div class="toasts" id="toasts"></div>
</div>

<script>

const container = document.getElementById("toasts");
const MAX_TOASTS = 4;
const DURATION = 4000;

const icons = {
success:"✔",
info:"ℹ",
warn:"⚠",
error:"✖"
};

function notify(message,type){

if(container.children.length >= MAX_TOASTS){
container.firstChild.remove();
}

const toast = document.createElement("div");
toast.className = `toast ${type}`;

toast.innerHTML = `
<div class="toast-content">
<div class="toast-icon">${icons[type]}</div>
<span>${message}</span>
</div>
<button>&times;</button>
<div class="progress"><span style="animation-duration:${DURATION}ms"></span></div>
`;

container.appendChild(toast);

let timer = setTimeout(()=>removeToast(toast),DURATION);

toast.addEventListener("mouseenter",()=>{
clearTimeout(timer);
toast.querySelector(".progress span").style.animationPlayState="paused";
});

toast.addEventListener("mouseleave",()=>{
timer = setTimeout(()=>removeToast(toast),1500);
toast.querySelector(".progress span").style.animationPlayState="running";
});

toast.querySelector("button").onclick=()=>removeToast(toast);
}

function removeToast(toast){
toast.style.animation="slideOut .35s forwards";
setTimeout(()=>toast.remove(),350);
}

</script>

</body>
</html>
