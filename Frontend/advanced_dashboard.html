<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Task Dashboard</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#020617;
  --card:rgba(255,255,255,.06);
  --accent:#38bdf8;
  --text:#fff;
}

.light{
  --bg1:#f1f5f9;
  --bg2:#e2e8f0;
  --card:#ffffff;
  --accent:#2563eb;
  --text:#000;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}

body{
  height:100vh;
  display:flex;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  transition:.3s;
}

/* Sidebar */
.sidebar{
  width:230px;
  padding:20px;
  background:var(--card);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(255,255,255,.1);
}
.sidebar h2{color:var(--accent);text-align:center;margin-bottom:20px}
.theme-toggle{
  margin-top:20px;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  text-align:center;
  font-weight:600;
}

/* Main */
.main{flex:1;padding:25px;overflow:auto}

/* Card */
.card{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  transition:.3s;
}

/* Inputs */
.task-input{display:flex;gap:10px;flex-wrap:wrap}
input,select{
  padding:10px;border:none;border-radius:8px;outline:none
}
button{
  padding:10px 15px;
  border:none;border-radius:8px;
  background:var(--accent);
  font-weight:600;cursor:pointer;
}
button:hover{transform:scale(1.05)}

.search{margin-top:10px;width:100%}

/* Tasks */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,.08);
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  cursor:grab;
  transition:.2s;
}
.task:hover{transform:translateX(5px)}
.task.done{opacity:.5;text-decoration:line-through}

.priority{
  font-size:12px;
  padding:4px 8px;
  border-radius:6px;
  margin-right:6px;
  color:#000;
}
.low{background:#22c55e}
.medium{background:#facc15}
.high{background:#ef4444;color:#fff}

/* Progress Circle */
.progress-wrapper{
  display:flex;align-items:center;gap:20px;
}
svg{transform:rotate(-90deg)}
circle{
  fill:none;
  stroke-width:8;
}
.bg{stroke:rgba(255,255,255,.1)}
.fg{
  stroke:var(--accent);
  stroke-dasharray:440;
  stroke-dashoffset:440;
  transition:.4s;
}
.stats{font-size:14px}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Pro Tasks</h2>
  <div class="theme-toggle" id="themeBtn">Toggle Theme</div>
</div>

<div class="main">

  <!-- Add Task -->
  <div class="card">
    <h3>Add Task</h3>
    <div class="task-input">
      <input id="taskInput" placeholder="Task...">
      <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
      <input type="date" id="due">
      <button id="addBtn">Add</button>
    </div>
    <input class="search" id="search" placeholder="Search task...">
  </div>

  <!-- Progress -->
  <div class="card progress-wrapper">
    <svg width="160" height="160">
      <circle cx="80" cy="80" r="70" class="bg"></circle>
      <circle cx="80" cy="80" r="70" class="fg" id="circle"></circle>
    </svg>
    <div class="stats" id="stats"></div>
  </div>

  <!-- Task List -->
  <div class="card">
    <h3>Your Tasks</h3>
    <div id="taskList"></div>
  </div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasksPro")||"[]");
let searchQuery="";

const list=document.getElementById("taskList");
const circle=document.getElementById("circle");
const stats=document.getElementById("stats");

/* Save */
function save(){
  localStorage.setItem("tasksPro",JSON.stringify(tasks));
}

/* Render */
function render(){
  list.innerHTML="";
  let filtered=tasks.filter(t=>t.text.toLowerCase().includes(searchQuery));

  let done=tasks.filter(t=>t.done).length;
  let percent=tasks.length?done/tasks.length:0;
  circle.style.strokeDashoffset=440-(440*percent);
  stats.innerHTML=`${done} / ${tasks.length} Completed`;

  filtered.forEach((t,index)=>{
    const div=document.createElement("div");
    div.className="task"+(t.done?" done":"");
    div.draggable=true;

    div.innerHTML=`
      <div>
        <span class="priority ${t.priority}">${t.priority}</span>
        ${t.text} <small>(${t.due||"No date"})</small>
      </div>
      <div>
        <button data-act="edit">✎</button>
        <button data-act="toggle">✓</button>
        <button data-act="del">✕</button>
      </div>
    `;

    div.onclick=e=>{
      if(e.target.dataset.act==="toggle"){t.done=!t.done}
      if(e.target.dataset.act==="del"){tasks.splice(tasks.indexOf(t),1)}
      if(e.target.dataset.act==="edit"){
        let newText=prompt("Edit task:",t.text);
        if(newText) t.text=newText;
      }
      save();render();
    };

    /* Drag reorder */
    div.ondragstart=()=>div.classList.add("drag");
    div.ondragend=()=>{
      div.classList.remove("drag");
      let items=[...list.children];
      tasks=items.map(el=>{
        let text=el.innerText.split("\n")[0].trim();
        return tasks.find(t=>text.includes(t.text));
      });
      save();
    };

    list.appendChild(div);
  });
}

/* Add */
function add(){
  let text=document.getElementById("taskInput").value;
  let priority=document.getElementById("priority").value;
  let due=document.getElementById("due").value;
  if(!text.trim())return;
  tasks.push({text,priority,due,done:false});
  document.getElementById("taskInput").value="";
  save();render();
}

/* Events */
document.getElementById("addBtn").onclick=add;
document.getElementById("search").oninput=e=>{
  searchQuery=e.target.value.toLowerCase();
  render();
};
document.getElementById("themeBtn").onclick=()=>{
  document.body.classList.toggle("light");
};

render();
</script>

</body>
</html>
