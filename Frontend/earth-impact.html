<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarthTrace — Human Impact Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0a;
    --surface: #111811;
    --card: #161e16;
    --border: #1e2e1e;
    --green: #4ade80;
    --lime: #a3e635;
    --amber: #fbbf24;
    --red: #f87171;
    --orange: #fb923c;
    --blue: #60a5fa;
    --text: #e8f5e8;
    --muted: #6b7f6b;
    --accent: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated bg grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,10,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* HERO */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px 40px 60px;
  }

  .hero-label {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease both;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 110px);
    line-height: 0.9;
    letter-spacing: 4px;
    animation: fadeUp 0.6s 0.1s ease both;
    background: linear-gradient(135deg, #e8f5e8, #4ade80 50%, #a3e635);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    margin-top: 24px;
    font-size: 17px;
    color: var(--muted);
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CATEGORY FILTER */
  .category-strip {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    padding: 0 40px 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cat-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s ease;
  }

  .cat-btn:hover, .cat-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(74,222,128,0.06);
  }

  /* ITEM GRID */
  .grid-container {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    padding: 0 40px 40px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .item-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(74,222,128,0.04));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .item-card:hover {
    border-color: rgba(74,222,128,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .item-card:hover::before { opacity: 1; }

  .item-card.selected {
    border-color: var(--green);
    background: rgba(74,222,128,0.07);
  }

  .item-icon { font-size: 28px; }

  .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .item-cat {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .severity-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    position: absolute;
    top: 14px; right: 14px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open {
    display: flex;
    animation: overlayIn 0.3s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 780px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.3s ease;
    position: relative;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.93) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 32px 36px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .modal-icon { font-size: 48px; }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text);
  }

  .modal-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .close-btn:hover { border-color: var(--red); color: var(--red); }

  .modal-body { padding: 32px 36px; }

  /* IMPACT METERS */
  .impact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .impact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
  }

  .impact-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .impact-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 10px;
  }

  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* DEGRADATION TIMELINE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .timeline {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    position: relative;
  }

  .timeline::before {
    content: '';
    position: absolute;
    top: 20px; left: 20px; right: 20px;
    height: 2px;
    background: var(--border);
  }

  .t-step {
    flex: 1;
    text-align: center;
    position: relative;
  }

  .t-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 auto 12px;
    position: relative;
    z-index: 1;
    border: 2px solid var(--bg);
  }

  .t-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--green);
  }

  .t-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  /* IMPACT AREAS */
  .impact-areas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .area-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .area-icon { font-size: 20px; }

  .area-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .area-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* FACTS */
  .facts-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .fact-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px 16px;
    background: var(--surface);
    border-left: 3px solid var(--green);
    border-radius: 0 6px 6px 0;
  }

  .fact-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--green);
    min-width: 28px;
    line-height: 1;
  }

  .fact-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    padding-top: 2px;
  }

  /* ALTERNATIVES */
  .alternatives {
    background: rgba(74,222,128,0.05);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 8px;
    padding: 20px 24px;
  }

  .alternatives h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--green);
    margin-bottom: 12px;
  }

  .alt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .alt-pill {
    font-size: 12px;
    padding: 5px 12px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    border-radius: 20px;
    color: var(--green);
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    z-index: 1;
    padding: 0 40px 24px;
    max-width: 600px;
    margin: 0 auto;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 14px 20px 14px 46px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(74,222,128,0.4); }

  .search-icon {
    position: absolute;
    left: 56px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  /* FOOTER STATS */
  .stats-bar {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .stat-item {
    flex: 1;
    padding: 24px 30px;
    border-right: 1px solid var(--border);
    text-align: center;
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--green);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    .grid-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 0 20px 20px; }
    .category-strip { padding: 0 20px 24px; }
    .search-wrap { padding: 0 20px 20px; }
    .hero { padding: 50px 20px 40px; }
    .impact-grid { grid-template-columns: 1fr; }
    .impact-areas { grid-template-columns: 1fr 1fr; }
    .modal-body { padding: 20px; }
    .modal-header { padding: 20px; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    EARTHTRACE
  </div>
  <div class="header-tag">// Human Impact Explorer v1.0</div>
</header>

<section class="hero">
  <div class="hero-label">🌍 Know Your Footprint</div>
  <h1>HOW HUMANS<br>HURT EARTH</h1>
  <p>Select any everyday item to discover its environmental cost — from production to disposal. Every choice leaves a mark.</p>
</section>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-num" id="totalItems">62</div>
    <div class="stat-label">Items Tracked</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">8B+</div>
    <div class="stat-label">Humans Impacting</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">6°C</div>
    <div class="stat-label">Warming Risk</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">1M+</div>
    <div class="stat-label">Species Threatened</div>
  </div>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="searchInput" type="text" placeholder="Search items... e.g. plastic bottle, leather, diesel">
</div>

<div class="category-strip" id="categoryStrip">
  <button class="cat-btn active" data-cat="all">All Items</button>
  <button class="cat-btn" data-cat="plastic">Plastic</button>
  <button class="cat-btn" data-cat="paper">Paper & Wood</button>
  <button class="cat-btn" data-cat="fabric">Fabric & Clothing</button>
  <button class="cat-btn" data-cat="food">Food & Farming</button>
  <button class="cat-btn" data-cat="electronic">Electronics</button>
  <button class="cat-btn" data-cat="transport">Transport & Fuel</button>
  <button class="cat-btn" data-cat="chemical">Chemicals</button>
  <button class="cat-btn" data-cat="animal">Animal Products</button>
  <button class="cat-btn" data-cat="energy">Energy</button>
  <button class="cat-btn" data-cat="waste">Waste</button>
  <button class="cat-btn" data-cat="water">Water Use</button>
</div>

<div class="grid-container" id="itemGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-icon" id="mIcon"></div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-subtitle" id="mSubtitle"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

// COLOR HELPERS
function severityColor(pct) {
  if (pct >= 80) return '#f87171';
  if (pct >= 60) return '#fb923c';
  if (pct >= 40) return '#fbbf24';
  return '#4ade80';
}

function severityDotColor(s) {
  const map = { critical:'#f87171', high:'#fb923c', medium:'#fbbf24', low:'#4ade80' };
  return map[s] || '#6b7f6b';
}

// RENDER GRID
function renderGrid(items) {
  const grid = document.getElementById('itemGrid');
  grid.innerHTML = '';
  if (items.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-family:DM Mono,monospace;letter-spacing:2px;font-size:12px;">// NO ITEMS FOUND</div>';
    return;
  }
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="severity-dot" style="background:${severityDotColor(item.severity)}"></div>
      <div class="item-icon">${item.icon}</div>
      <div class="item-name">${item.name}</div>
      <div class="item-cat">${item.cat.toUpperCase()}</div>
    `;
    card.addEventListener('click', () => openModal(item));
    grid.appendChild(card);
  });
}

// MODAL
function openModal(item) {
  document.getElementById('mIcon').textContent = item.icon;
  document.getElementById('mTitle').textContent = item.name.toUpperCase();
  document.getElementById('mSubtitle').textContent = `${item.cat.toUpperCase()} · SEVERITY: ${item.severity.toUpperCase()}`;

  const impactData = [
    { label:'Nature Impact', value: item.nature, color: severityColor(item.nature) },
    { label:'Human Health', value: item.human, color: severityColor(item.human) },
    { label:'Animal Impact', value: item.animal, color: severityColor(item.animal) },
    { label:'Social Impact', value: item.social, color: severityColor(item.social) },
  ];

  const impactCards = impactData.map(d => `
    <div class="impact-card">
      <div class="impact-label">${d.label}</div>
      <div class="impact-value" style="color:${d.color}">${d.value}%</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%;background:${d.color}" data-target="${d.value}"></div>
      </div>
    </div>
  `).join('');

  const timelineSteps = item.timeline.map((yr, i) => `
    <div class="t-step">
      <div class="t-dot" style="background:${['#4ade80','#a3e635','#fbbf24','#fb923c','#f87171'][i] || '#4ade80'}"></div>
      <div class="t-year">${yr}</div>
      <div class="t-label">${item.tEvents[i] || ''}</div>
    </div>
  `).join('');

  const areasHTML = item.impacts.map(a => `
    <div class="area-chip">
      <div class="area-icon">${a.icon}</div>
      <div class="area-name">${a.name}</div>
      <div class="area-desc">${a.desc}</div>
    </div>
  `).join('');

  const factsHTML = item.facts.map((f, i) => `
    <div class="fact-item">
      <div class="fact-num">${f.n}</div>
      <div class="fact-text">${f.t}</div>
    </div>
  `).join('');

  const altPills = item.alternatives.map(a => `<div class="alt-pill">✓ ${a}</div>`).join('');

  document.getElementById('modalBody').innerHTML = `
    <div style="display:flex;gap:20px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px">
      <div style="flex:1;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">CO₂ Footprint</div><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange);letter-spacing:1px">${item.co2}</div></div>
      <div style="width:1px;background:var(--border)"></div>
      <div style="flex:1;text-align:center"><div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Time to Degrade</div><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red);letter-spacing:1px">${item.degradation}</div></div>
    </div>

    <div class="section-title">IMPACT SCORES</div>
    <div class="impact-grid">${impactCards}</div>

    <div class="section-title">DEGRADATION JOURNEY</div>
    <div class="timeline">${timelineSteps}</div>

    <div class="section-title">IMPACT AREAS</div>
    <div class="impact-areas">${areasHTML}</div>

    <div class="section-title">CRITICAL FACTS</div>
    <div class="facts-list">${factsHTML}</div>

    <div class="alternatives">
      <h3>♻ BETTER ALTERNATIVES</h3>
      <div class="alt-pills">${altPills}</div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.bar-fill[data-target]').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  }, 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// FILTER LOGIC
let activeCategory = 'all';
let searchTerm = '';

function filterItems() {
  let result = ITEMS;
  if (activeCategory !== 'all') result = result.filter(i => i.cat === activeCategory);
  if (searchTerm) result = result.filter(i =>
    i.name.toLowerCase().includes(searchTerm) ||
    i.cat.toLowerCase().includes(searchTerm) ||
    i.severity.toLowerCase().includes(searchTerm)
  );
  renderGrid(result);
}

document.getElementById('categoryStrip').addEventListener('click', e => {
  if (!e.target.matches('.cat-btn')) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeCategory = e.target.dataset.cat;
  filterItems();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  filterItems();
});

// INIT
renderGrid(ITEMS);
document.getElementById('totalItems').textContent = ITEMS.length;
</script>
