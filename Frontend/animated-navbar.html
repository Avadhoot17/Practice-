<!DOCTYPE html>
<html>
<head>
<title>Animated Navbar</title>

<style>

body{
margin:0;
font-family:Arial;
}

.navbar{
background:#000;
display:flex;
justify-content:center;
padding:15px;
}

.navbar a{
color:white;
text-decoration:none;
margin:20px;
position:relative;
}

.navbar a::after{
content:'';
position:absolute;
width:0%;
height:2px;
background:red;
bottom:-5px;
left:0;
transition:0.4s;
}

.navbar a:hover::after{
width:100%;
}

</style>

</head>

<body>

<div class="navbar">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Portfolio</a>
<a href="#">Contact</a>
</div>

</body>
</html>
